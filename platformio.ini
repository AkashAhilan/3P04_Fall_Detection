; https://docs.platformio.org/page/projectconf.html

[env:pico32]
platform = espressif32
board = pico32
framework = arduino
lib_deps = 
	olkal/HX711_ADC@^1.2.12
	dfrobot/DFRobot_RGBLCD1602@^2.0.1
	arduinogetstarted/ezButton@^1.0.6
monitor_speed = 115200
